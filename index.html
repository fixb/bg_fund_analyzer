<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BG Fund — Historical Data Analyzer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;--surface:#111827;--surface2:#1a2234;--surface3:#232d42;
  --border:#2a3550;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --accent:#3b82f6;--accent2:#60a5fa;--green:#10b981;--red:#ef4444;
  --amber:#f59e0b;--purple:#a78bfa;--cyan:#22d3ee;--pink:#f472b6;
  --radius:10px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
.app{max-width:1440px;margin:0 auto;padding:20px;padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right))}

.header{display:flex;align-items:center;justify-content:space-between;padding:24px 0;border-bottom:1px solid var(--border);margin-bottom:24px;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:700;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--accent2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{color:var(--text3);font-size:13px;margin-top:2px;-webkit-text-fill-color:var(--text3)}
.header-right{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.date-range{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 14px;color:var(--text2);font-size:12px;font-family:'JetBrains Mono',monospace}

/* Import button & dropzone */
.import-btn{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:6px}
.import-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(59,130,246,.3)}
.import-btn svg{width:16px;height:16px}
.dropzone-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(10,14,23,.92);backdrop-filter:blur(8px);align-items:center;justify-content:center;flex-direction:column;gap:16px}
.dropzone-overlay.visible{display:flex}
.dropzone-box{border:2px dashed var(--accent);border-radius:16px;padding:60px 80px;text-align:center;transition:all .2s}
.dropzone-box.dragover{border-color:var(--cyan);background:rgba(34,211,238,.05);transform:scale(1.02)}
.dropzone-box h2{font-size:20px;color:var(--text);margin-bottom:8px}
.dropzone-box p{color:var(--text3);font-size:13px;margin-bottom:20px}
.dropzone-box .browse-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 24px;color:var(--accent2);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.dropzone-box .browse-btn:hover{background:var(--surface3);border-color:var(--accent)}
.dropzone-close{position:absolute;top:24px;right:32px;background:none;border:none;color:var(--text3);font-size:28px;cursor:pointer;padding:8px}
.dropzone-close:hover{color:var(--text)}

/* Loading */
.import-loading{display:none;align-items:center;gap:10px;color:var(--accent2);font-size:13px}
.import-loading.visible{display:flex}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--green);border-radius:10px;padding:14px 20px;color:var(--green);font-size:13px;z-index:2000;opacity:0;transform:translateY(12px);transition:all .3s;pointer-events:none;display:flex;align-items:center;gap:8px;max-width:400px}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.visible{opacity:1;transform:translateY(0)}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.tab{padding:10px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text3);background:transparent;border:1px solid transparent;transition:all .2s;white-space:nowrap;user-select:none}
.tab:hover{color:var(--text2);background:var(--surface)}
.tab.active{color:var(--accent2);background:var(--surface2);border-color:var(--border)}

/* KPI Row */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.kpi .label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.kpi .value{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-1px}
.kpi .change{font-size:12px;margin-top:4px;font-family:'JetBrains Mono',monospace}
.kpi .change.pos{color:var(--green)}.kpi .change.neg{color:var(--red)}

/* Charts */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.chart-card.full{grid-column:1/-1}
.chart-card h3{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--text)}
.chart-card .desc{font-size:11px;color:var(--text3);margin-bottom:14px}
.chart-wrap{position:relative;width:100%;height:320px}
.chart-card.tall .chart-wrap{height:420px}

/* Table */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:auto;margin-bottom:24px;max-height:500px;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px;font-family:'JetBrains Mono',monospace}
thead{position:sticky;top:0;z-index:2}
th{background:var(--surface2);color:var(--text3);padding:10px 12px;text-align:right;font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap}
th:first-child{text-align:left;position:sticky;left:0;z-index:3;background:var(--surface2)}
td{padding:8px 12px;border-bottom:1px solid var(--border);text-align:right;color:var(--text2)}
td:first-child{text-align:left;color:var(--text);font-weight:500;position:sticky;left:0;background:var(--surface);z-index:1}
tr:hover td{background:var(--surface2)}

/* Controls */
.controls{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none}
select:focus{border-color:var(--accent)}

.section-title{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text)}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* iPad mini landscape & medium tablets (1024-1180px) */
@media(max-width:1180px){
  .app{padding:16px}
  .chart-wrap{height:280px}
  .chart-card.tall .chart-wrap{height:360px}
  .chart-card{padding:16px}
  .kpi{padding:14px 16px}
  .kpi .value{font-size:22px}
}
/* iPad mini portrait & small tablets (≤900px) */
@media(max-width:900px){
  .charts-grid{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .compare-row{grid-template-columns:1fr}
  .chart-wrap{height:300px}
  .chart-card.tall .chart-wrap{height:380px}
  .dropzone-box{padding:40px 32px}
  .dropzone-box h2{font-size:18px}
  .header h1{font-size:20px}
  .tab{padding:11px 16px;font-size:13px}
  .import-btn{padding:11px 18px;font-size:13px}
  .slider-presets button,.window-pill,.alloc-presets button{padding:9px 14px;min-height:36px}
  .export-btn{padding:6px 10px;font-size:11px;min-height:32px}
  select{padding:9px 12px;font-size:13px;min-height:36px}
  .table-wrap{max-height:60vh}
  th,td{padding:9px 10px}
}
@media(max-width:600px){
  .app{padding:12px}
  .kpi-row{grid-template-columns:1fr}
  .header{flex-direction:column;align-items:flex-start;gap:12px}
  .header-right{width:100%;justify-content:space-between}
  .chart-wrap{height:240px}
  .chart-card.tall .chart-wrap{height:320px}
  .dropzone-box{padding:32px 20px}
}
/* Touch device tweaks */
@media(hover:none) and (pointer:coarse){
  .tab,.import-btn,.export-btn,.slider-presets button,.window-pill,.alloc-presets button,select,.browse-btn{touch-action:manipulation}
  .tab:hover,.import-btn:hover,.export-btn:hover{transform:none}
  tr:hover td{background:initial}
  .range-track input[type=range]::-webkit-slider-thumb{width:24px;height:24px}
  .range-track input[type=range]::-moz-range-thumb{width:24px;height:24px}
  .alloc-slider::-webkit-slider-thumb{width:26px;height:26px}
  .alloc-slider::-moz-range-thumb{width:26px;height:26px}
}

/* Date Range Slider */
.date-slider-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.date-slider-wrap .slider-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
.date-slider-wrap .slider-dates{display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent2)}
.date-slider-wrap .slider-dates span{min-width:70px;text-align:center}
.range-track{flex:1;min-width:200px;position:relative;height:36px;display:flex;align-items:center}
.range-track .track-bg{position:absolute;left:0;right:0;height:4px;background:var(--surface3);border-radius:2px}
.range-track .track-fill{position:absolute;height:4px;background:linear-gradient(90deg,var(--accent),var(--cyan));border-radius:2px;pointer-events:none}
.range-track input[type=range]{position:absolute;width:100%;height:36px;-webkit-appearance:none;appearance:none;background:transparent;pointer-events:none;margin:0}
.range-track input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent2);border:2px solid var(--bg);cursor:pointer;pointer-events:auto;box-shadow:0 0 8px rgba(59,130,246,.4);transition:transform .15s}
.range-track input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2);box-shadow:0 0 12px rgba(59,130,246,.6)}
.range-track input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--accent2);border:2px solid var(--bg);cursor:pointer;pointer-events:auto;box-shadow:0 0 8px rgba(59,130,246,.4)}
.range-track input[type=range]::-moz-range-track{background:transparent}
.slider-presets{display:flex;gap:4px;flex-wrap:wrap}
.slider-presets button{padding:5px 10px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.slider-presets button:hover{color:var(--text2);border-color:var(--accent)}
.slider-presets button.active{color:var(--accent2);border-color:var(--accent);background:rgba(59,130,246,.1)}


/* Export buttons */
.chart-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.chart-header h3{font-size:14px;font-weight:600;color:var(--text);margin:0}
.export-btns{display:flex;gap:4px;flex-shrink:0}
.export-btn{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:4px 8px;color:var(--text3);font-size:10px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:3px}
.export-btn:hover{color:var(--accent2);border-color:var(--accent);background:rgba(59,130,246,.08)}
.export-btn svg{width:12px;height:12px}
.table-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.table-header .section-title{margin-bottom:0}


/* Heatmap */
.heatmap-wrap{overflow-x:auto;margin-bottom:24px;-webkit-overflow-scrolling:touch}
.heatmap{border-collapse:collapse;font-size:11px;font-family:'JetBrains Mono',monospace}
.heatmap th{background:var(--surface2);color:var(--text3);padding:8px 6px;font-weight:500;white-space:nowrap;border:1px solid var(--border);text-align:center;font-size:10px}
.heatmap th.row-header{text-align:right;min-width:100px;position:sticky;left:0;z-index:1;background:var(--surface2)}
.heatmap td{padding:6px 8px;text-align:center;border:1px solid var(--border);font-weight:500;min-width:65px;transition:all .1s}
.heatmap td:first-child{text-align:right;background:var(--surface2);color:var(--text3);font-weight:500;position:sticky;left:0;z-index:1;min-width:100px}
.heatmap tr:hover td{opacity:.9}
.matrix-section{margin-bottom:32px}
.matrix-section h3{font-size:15px;font-weight:600;margin-bottom:4px}
.matrix-section .desc{font-size:11px;color:var(--text3);margin-bottom:12px}
.window-pills{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.window-pill{padding:7px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text3);background:var(--surface2);border:1px solid var(--border);transition:all .15s;font-family:'DM Sans',sans-serif}
.window-pill:hover{color:var(--text2)}
.window-pill.active{color:var(--accent2);border-color:var(--accent);background:rgba(59,130,246,.1)}


/* Allocator */
.compare-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.compare-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.compare-card h4{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.compare-card h4 .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.compare-card .stat-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)}
.compare-card .stat-row:last-child{border:none}
.compare-card .stat-row .label{color:var(--text3)}
.compare-card .stat-row .val{font-family:'JetBrains Mono',monospace;font-weight:500}

</style>
</head>

// ============= EXCEL PARSER =============
function parseExcelToRAW(workbook) {
  const result = {};

  // Helper: parse sheet to array of arrays
  function sheetToAoA(name) {
    const ws = workbook.Sheets[name];
    if (!ws) return null;
    return XLSX.utils.sheet_to_json(ws, {header:1, defval:null, raw:true});
  }

  // Helper: Excel serial date to ISO string
  function xlDate(v) {
    if (!v) return null;
    if (typeof v === 'string') {
      const d = new Date(v);
      if (!isNaN(d)) return d.toISOString().slice(0,10);
      return null;
    }
    if (typeof v === 'number') {
      // Excel serial date
      const d = new Date((v - 25569) * 86400000);
      if (!isNaN(d)) return d.toISOString().slice(0,10);
    }
    return null;
  }

  function num(v) {
    if (v == null || v === '' || v === '-' || v === '—') return undefined;
    const n = Number(v);
    return isNaN(n) ? undefined : Math.round(n * 1e8) / 1e8;
  }

  // 1. Monthly NAV
  const navSheet = sheetToAoA('Monthly NAV');
  if (navSheet) {
    result.nav = [];
    for (let i = 2; i < navSheet.length; i++) {
      const r = navSheet[i];
      const d = xlDate(r[0]);
      if (!d) continue;
      const entry = {d};
      const set = (k,v) => { const n = num(v); if (n !== undefined) entry[k] = n; };
      set('un',r[1]); set('um',r[2]); set('uy',r[3]); set('ub',r[4]);
      set('en',r[7]); set('em',r[8]); set('ey',r[9]); set('eb',r[10]);
      set('gn',r[13]); set('gm',r[14]); set('gy',r[15]);
      set('cn',r[18]); set('cm',r[19]); set('cy',r[20]);
      set('a',r[31]); set('v',r[33]);
      result.nav.push(entry);
    }
  }

  // 2. Performance attribution
  const perfSheet = sheetToAoA('Performance attribution');
  if (perfSheet) {
    result.perf = [];
    for (let i = 4; i < perfSheet.length; i++) {
      const r = perfSheet[i];
      const d = xlDate(r[1]);
      if (!d) continue;
      const entry = {d};
      const set = (k,v) => { const n = num(v); if (n !== undefined) entry[k] = n; };
      set('yr',r[0]); set('vs',r[2]); set('mc',r[3]); set('cb',r[4]);
      set('vt',r[5]); set('wa',r[6]); set('es',r[7]); set('ra',r[8]);
      set('ls',r[9]); set('cs',r[10]); set('cl',r[11]); set('ca',r[12]);
      set('cx',r[13]); set('ts',r[14]); set('t',r[15]);
      result.perf.push(entry);
    }
  }

  // 3. Exposure
  const expSheet = sheetToAoA('Exposure (%)');
  if (expSheet) {
    result.exp = [];
    for (let i = 5; i < expSheet.length; i++) {
      const r = expSheet[i];
      const d = xlDate(r[0]);
      if (!d) continue;
      const entry = {d};
      const set = (k,v) => { const n = num(v); if (n !== undefined) entry[k] = n; };
      set('cb',r[1]); set('vt',r[5]); set('wa',r[8]); set('eq',r[11]);
      set('ra',r[14]); set('ls',r[17]); set('cl',r[20]); set('cs',r[23]);
      set('cx',r[26]); set('tr',r[29]); set('qe',r[32]); set('sy',r[35]); set('ot',r[38]);
      if (r.length > 42) { set('g',r[42]); set('n',r[43]); set('l',r[44]); set('s',r[45]); }
      if (r.length > 47) set('am',r[47]);
      result.exp.push(entry);
    }
  }

  // 4. Equity at risk
  const earSheet = sheetToAoA('Equity at risk');
  if (earSheet) {
    result.ear = [];
    for (let i = 4; i < earSheet.length; i++) {
      const r = earSheet[i];
      const d = xlDate(r[0]);
      if (!d) continue;
      const entry = {d};
      const set = (k,v) => { const n = num(v); if (n !== undefined) entry[k] = n; };
      set('te',r[16]); set('vt',r[18]); set('et',r[19]); set('ct',r[20]); set('tt',r[21]);
      result.ear.push(entry);
    }
  }

  // 5. Greeks
  const greeksSheet = sheetToAoA('Greeks');
  if (greeksSheet) {
    result.greeks = [];
    for (let i = 3; i < greeksSheet.length; i++) {
      const r = greeksSheet[i];
      const d = xlDate(r[0]);
      if (!d) continue;
      const entry = {d};
      const set = (k,v) => { const n = num(v); if (n !== undefined) entry[k] = n; };
      set('de',r[1]); set('ga',r[2]); set('ve',r[3]); set('evw',r[4]); set('th',r[6]); set('oth',r[7]);
      if (r.length > 8) set('ir',r[8]);
      if (r.length > 10) set('cr',r[10]);
      result.greeks.push(entry);
    }
  }

  // 6. Leverage
  const levSheet = sheetToAoA('Leverage');
  if (levSheet) {
    result.lev = [];
    for (let i = 4; i < levSheet.length; i++) {
      const r = levSheet[i];
      const d = xlDate(r[0]);
      if (!d) continue;
      const entry = {d};
      const set = (k,v) => { const n = num(v); if (n !== undefined) entry[k] = n; };
      set('cmx',r[1]); set('cc',r[2]); set('gmx',r[3]); set('gc',r[4]);
      result.lev.push(entry);
    }
  }

  // 7. Cash
  const cashSheet = sheetToAoA('Cash');
  if (cashSheet) {
    result.cash = [];
    for (let i = 4; i < cashSheet.length; i++) {
      const r = cashSheet[i];
      const d = xlDate(r[0]);
      if (!d) continue;
      const entry = {d};
      const set = (k,v) => { const n = num(v); if (n !== undefined) entry[k] = n; };
      set('u',r[1]); set('t',r[2]);
      result.cash.push(entry);
    }
  }

  // 8. IFRS13
  const ifrsSheet = sheetToAoA('IFRS13');
  if (ifrsSheet) {
    result.ifrs = [];
    for (let i = 4; i < ifrsSheet.length; i++) {
      const r = ifrsSheet[i];
      const d = xlDate(r[0]);
      if (!d) continue;
      const entry = {d};
      const set = (k,v) => { const n = num(v); if (n !== undefined) entry[k] = n; };
      set('a1',r[1]); set('a2',r[2]); set('a3',r[3]); set('ce',r[4]); set('ta',r[5]);
      set('l1',r[7]); set('l2',r[8]); set('l3',r[9]); set('tl',r[10]); set('nt',r[11]);
      result.ifrs.push(entry);
    }
  }

  return result;
}

// ============= FILE HANDLING =============
function openDropzone() {
  document.getElementById('dropzone').classList.add('visible');
}
function closeDropzone() {
  document.getElementById('dropzone').classList.remove('visible');
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast visible' + (isError ? ' error' : '');
  setTimeout(() => t.classList.remove('visible'), 4000);
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file) processFile(file);
  e.target.value = '';
}

function processFile(file) {
  if (!file.name.match(/\.xlsx?$/i)) {
    showToast('⚠ Please upload an .xlsx file', true);
    return;
  }
  closeDropzone();
  showToast('⏳ Parsing ' + file.name + '...', false);

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array', cellDates:false, cellNF:false, cellText:false});

      // Check required sheets
      const required = ['Monthly NAV'];
      const missing = required.filter(s => !wb.SheetNames.includes(s));
      if (missing.length) {
        showToast('⚠ Missing sheets: ' + missing.join(', '), true);
        return;
      }

      const parsed = parseExcelToRAW(wb);

      // Validate we got data
      const navCount = parsed.nav ? parsed.nav.length : 0;
      if (navCount === 0) {
        showToast('⚠ No NAV data found — check file format', true);
        return;
      }

      // Merge: keep existing data for sheets not in new file
      for (const key of ['nav','perf','exp','ear','greeks','lev','cash','ifrs']) {
        if (parsed[key] && parsed[key].length > 0) {
          RAW[key] = parsed[key];
        }
      }

      render();
      showToast('✓ Loaded ' + file.name + ' — ' + navCount + ' months of NAV data', false);
    } catch(err) {
      console.error(err);
      showToast('⚠ Error parsing file: ' + err.message, true);
    }
  };
  reader.readAsArrayBuffer(file);
}

// Global drag & drop
document.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('dropzone').classList.add('visible'); });
document.addEventListener('dragleave', e => { if (e.relatedTarget === null) document.getElementById('dropzone').classList.remove('visible'); });
document.getElementById('dropbox').addEventListener('dragover', e => { e.preventDefault(); e.currentTarget.classList.add('dragover'); });
document.getElementById('dropbox').addEventListener('dragleave', e => { e.currentTarget.classList.remove('dragover'); });
document.getElementById('dropbox').addEventListener('drop', e => {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});

// ============= UTILITY =============
const fmt = (v, type='pct') => {
  if(v == null || v === undefined || isNaN(v)) return '—';
  if(type === 'pct') return (v*100).toFixed(2) + '%';
  if(type === 'bps') return v.toFixed(1) + ' bps';
  if(type === 'nav') return v.toFixed(4);
  if(type === 'aum') return v >= 1000 ? (v/1000).toFixed(1) + 'B' : v.toFixed(0) + 'M';
  if(type === 'num') return v.toFixed(2);
  if(type === 'x') return v.toFixed(1) + 'x';
  return String(v);
};
const fmtDate = d => {
  const dt = new Date(d);
  return dt.toLocaleDateString('en-GB',{month:'short',year:'numeric'});
};
const colorVal = v => v > 0 ? 'pos' : v < 0 ? 'neg' : '';

let state = {tab: 'nav', currency: 'usd', rangeMin: 0, rangeMax: 1, preset: '3y', perfView: 'nl_strat', corrWindow: '3y', corrView: 'sub_strategy'};

// Date filtering
function getAllDates(tabKey) {
  const dataKey = {nav:'nav',perf:'perf',exposure:'exp',ear:'ear',greeks:'greeks',leverage:'lev',cash:'cash',ifrs:'ifrs'}[tabKey];
  return (RAW[dataKey] || []).map(r => r.d);
}
function getFilteredData(arr) {
  if (!arr || !arr.length) return arr;
  const total = arr.length;
  const iMin = Math.round(state.rangeMin * (total - 1));
  const iMax = Math.round(state.rangeMax * (total - 1));
  return arr.slice(iMin, iMax + 1);
}
function applyPreset(preset) {
  state.preset = preset;
  const dataKey = {nav:'nav',perf:'perf',exposure:'exp',ear:'ear',greeks:'greeks',leverage:'lev',cash:'cash',ifrs:'ifrs',analytics:'nav',corrbeta:'perf',perfstats:'nav'}[state.tab];
  const data = RAW[dataKey];
  if (!data || !data.length) return;
  const total = data.length;
  if (preset === 'all') { state.rangeMin = 0; state.rangeMax = 1; }
  else {
    const months = {ytd:0, '1y':12, '3y':36, '5y':60, '10y':120}[preset] || 0;
    if (preset === 'ytd') {
      const lastDate = data[data.length-1].d;
      const year = lastDate.slice(0,4);
      const janIdx = data.findIndex(r => r.d.slice(0,4) === year);
      state.rangeMin = janIdx >= 0 ? janIdx / (total - 1) : 0;
    } else {
      state.rangeMin = Math.max(0, (total - months) / (total - 1));
    }
    state.rangeMax = 1;
  }
  render();
}
function onSliderChange() {
  const sMin = document.getElementById('sliderMin');
  const sMax = document.getElementById('sliderMax');
  if (!sMin || !sMax) return;
  let lo = parseFloat(sMin.value);
  let hi = parseFloat(sMax.value);
  if (lo > hi - 0.01) { lo = hi - 0.01; sMin.value = lo; }
  state.rangeMin = lo;
  state.rangeMax = hi;
  state.preset = '';
  updateSliderUI();
}
function updateSliderUI() {
  const fill = document.getElementById('trackFill');
  const labelMin = document.getElementById('labelMin');
  const labelMax = document.getElementById('labelMax');
  if (!fill) return;
  fill.style.left = (state.rangeMin * 100) + '%';
  fill.style.width = ((state.rangeMax - state.rangeMin) * 100) + '%';
  const dataKey = {nav:'nav',perf:'perf',exposure:'exp',ear:'ear',greeks:'greeks',leverage:'lev',cash:'cash',ifrs:'ifrs',analytics:'nav',corrbeta:'perf',perfstats:'nav',allocator:'perf'}[state.tab];
  const data = RAW[dataKey];
  if (data && data.length) {
    const iMin = Math.round(state.rangeMin * (data.length - 1));
    const iMax = Math.round(state.rangeMax * (data.length - 1));
    labelMin.textContent = fmtDate(data[iMin].d);
    labelMax.textContent = fmtDate(data[iMax].d);
  }
  // highlight active preset
  document.querySelectorAll('.slider-presets button').forEach(b => {
    b.classList.toggle('active', b.dataset.preset === state.preset);
  });
}



function avg(arr) {
  const valid = arr.filter(v => v != null && !isNaN(v));
  return valid.length ? valid.reduce((a,b) => a+b, 0) / valid.length : null;
}
function avgLine(data, label, color) {
  const mean = avg(data);
  if (mean == null) return null;
  return {label: label + ' (avg: ' + mean.toFixed(1) + ')', data: data.map(() => mean), borderColor: color, borderWidth: 1, borderDash:[2,4], pointRadius:0, pointHoverRadius:0, fill:false, order:10};
}
// ============= EXPORT FUNCTIONS =============
function exportChartPNG(chartId, filename) {
  const chart = charts[chartId];
  if (!chart) return;
  // Temporarily increase resolution
  const canvas = chart.canvas;
  const link = document.createElement('a');
  link.download = (filename || chartId) + '.png';
  link.href = canvas.toDataURL('image/png', 1.0);
  link.click();
}

function exportChartCSV(headers, rows, filename) {
  let csv = headers.join(',') + '\n';
  rows.forEach(r => {
    csv += r.map(v => {
      if (v == null || v === undefined) return '';
      if (typeof v === 'string' && v.includes(',')) return '"' + v + '"';
      return v;
    }).join(',') + '\n';
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.download = (filename || 'export') + '.csv';
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
}

function exportAllTabCSV() {
  const tab = state.tab;
  const dataKey = {nav:'nav',perf:'perf',exposure:'exp',ear:'ear',greeks:'greeks',leverage:'lev',cash:'cash',ifrs:'ifrs'}[tab];
  const d = getFilteredData(RAW[dataKey]);
  if (!d || !d.length) return;
  // Get all keys
  const keys = [...new Set(d.flatMap(r=>Object.keys(r)))];
  const headers = keys.map(k => keyLabel(tab, k));
  const rows = d.map(r => keys.map(k => {
    const v = r[k];
    if (v == null) return '';
    return v;
  }));
  exportChartCSV(headers, rows, 'bg_fund_' + tab);
}

  `;

  const sliceN = Math.min(d.length, 120);

  charts.perfStack = new Chart(document.getElementById('perfStackChart'),{
    type:'bar',
    data:{
      labels:dSlice.map(r=>fmtDate(r.d)),
      datasets:V.groups.map(g => ({
        label:g.label, data:dSlice.map(r=>grpVal(r,g)), backgroundColor:g.color+'b3', stack:'s'
      }))

  });

  // ====== ANNUAL ======
  const annPerf = {};
  d.forEach(r=>{
    const yr = r.yr || r.d.slice(0,4);
    if(!annPerf[yr]) { annPerf[yr] = {}; V.groups.forEach(g => annPerf[yr][g.key]=0); annPerf[yr].t=0; }
    V.groups.forEach(g => annPerf[yr][g.key] += grpVal(r,g));
    annPerf[yr].t += r.t||0;
  });
  const yrs = Object.keys(annPerf).sort();
  charts.perfAnn = new Chart(document.getElementById('perfAnnualChart'),{
    type:'bar',
    data:{
      labels:yrs,
      datasets:V.groups.map(g => ({
        label:g.label, data:yrs.map(y=>annPerf[y][g.key]), backgroundColor:g.color
      }))
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{x:{stacked:true},y:{stacked:true,title:{display:true,text:'bps'}}}}
  });

  // ====== CUMULATIVE ======
  const cumData = {};
  V.groups.forEach(g => { cumData[g.key] = []; let s=0; d.forEach(r => { s += grpVal(r,g); cumData[g.key].push(s); }); });
  charts.perfCum = new Chart(document.getElementById('perfCumChart'),{
    type:'line',
    data:{
      labels:d.map(r=>fmtDate(r.d)),

  });

  // ====== TOTAL MONTHLY ======
  charts.perfTotal = new Chart(document.getElementById('perfTotalChart'),{
    type:'bar',
    data:{labels:dSlice.map(r=>fmtDate(r.d)),datasets:[{label:'Total bps',data:dSlice.map(r=>r.t||0),backgroundColor:dSlice.map(r=>(r.t||0)>=0?'rgba(16,185,129,.7)':'rgba(239,68,68,.7)'),borderRadius:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:12}},y:{title:{display:true,text:'bps'}}}}
  });

  // ====== PIE (period total) ======
  const pieTotals = V.groups.map(g => d.reduce((s,r) => s + grpVal(r,g), 0));
  charts.perfPie = new Chart(document.getElementById('perfPieChart'),{
    type:'doughnut',
    data:{
      labels:V.groups.map(g=>g.label),
      datasets:[{data:pieTotals.map(Math.abs),backgroundColor:V.groups.map(g=>g.color),borderWidth:0}]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{
      legend:{position:'right',labels:{font:{size:10}}},
      tooltip:{callbacks:{label:function(ctx){const v=pieTotals[ctx.dataIndex];return ctx.label+': '+(v>=0?'+':'')+v.toFixed(0)+' bps';}}}
    }}
  });

  // ====== TABLE ======
  const recent = d.slice(-24).reverse();
  let tHTML = '<thead><tr><th>Date</th>';
  V.groups.forEach(g => tHTML += `<th>${g.label}</th>`);
  tHTML += '<th>Total</th></tr></thead><tbody>';
  recent.forEach(r=>{
    const tc = (r.t||0) >= 0 ? 'color:var(--green)' : 'color:var(--red)';
    tHTML += `<tr><td>${fmtDate(r.d)}</td>`;
    V.groups.forEach(g => {
      const v = grpVal(r,g);
      const c = v > 0 ? 'color:var(--green)' : v < 0 ? 'color:var(--red)' : '';
      tHTML += `<td style="${c}">${v.toFixed(1)}</td>`;
    });
    tHTML += `<td style="font-weight:600;${tc}">${(r.t||0).toFixed(1)}</td></tr>`;
  });
  tHTML += '</tbody>';
  document.getElementById('perfTable').innerHTML = tHTML;

  // ====== TRANSCO REFERENCE TABLE ======
  const transco = [
    ['Mandatory CB Arb (mc)','Volatility','Long Vol','Protection — Volatility','Mandatory convertible bond arbitrage'],
    ['CB Arbitrage (cb)','Volatility','Long Vol','Protection — Volatility','Convertible bond arbitrage'],
    ['Vol Trading (vt)','Volatility','Overlay Vol','Protection — Volatility','Gamma Trading'],
    ['Warrant/Gamma Arb (wa)','Volatility','Long Vol','Protection — Volatility','Gamma Trading'],
    ['Risk Arb / Spec Sit (ra)','Equity','Event-Driven','Event Driven','Risk Arbitrage / Special Situations'],
    ['Long/Short Equity (ls)','Equity','Event-Driven','Event Driven','Value with Catalyst / Value'],
    ['Credit L/S (cl)','Credit','Event-Driven','Event Driven','Credit Long / Short'],
    ['Cap Struct Arb (ca)','Credit','Event-Driven','Event Driven','Capital Structure Arbitrage'],
    ['Credit Special Sit (cx)','Credit','Event-Driven','Event Driven','Credit Long / Short'],
    ['Trading (ts)','Trading','Mixed*','Mixed*','Trading + Overlays'],
  ];
  let trHTML = '<thead><tr><th>Perf Column</th><th>Asset Class</th><th>Strat Bucket</th><th>Main Strategy</th><th>Darius</th></tr></thead><tbody>';
  transco.forEach(r => {
    trHTML += `<tr>${r.map(v=>`<td>${v}</td>`).join('')}</tr>`;
  });
  trHTML += '</tbody><tfoot><tr><td colspan="5" style="font-size:10px;color:var(--text3);padding:10px">* Trading subtotal aggregates Event-Driven trading, Overlay Macro, Overlay EQT, Index Arb, and CTA — cannot be split from historical data</td></tr></tfoot>';
  document.getElementById('transcoTable').innerHTML = trHTML;
}

// ============= GREEKS =============
function renderGreeks(el){
  const d = getFilteredData(RAW.greeks);
  const lastVal = (k) => { for (let i=d.length-1;i>=0;i--) if (d[i][k]!=null) return {v:d[i][k],dt:d[i].d}; return null; };
  const lastDe = lastVal('de'), lastGa = lastVal('ga'), lastVe = lastVal('ve')||lastVal('evw'), lastTh = lastVal('th');

  el.innerHTML = `
    <div class="kpi-row">
      <div class="kpi"><div class="label">Delta</div><div class="value">${lastDe?(lastDe.v*100).toFixed(1)+'%':'—'}</div>${lastDe?`<div class="change">${fmtDate(lastDe.dt)}</div>`:''}</div>
      <div class="kpi"><div class="label">Gamma (1% move)</div><div class="value">${lastGa?(lastGa.v*100).toFixed(2)+'%':'—'}</div>${lastGa?`<div class="change">${fmtDate(lastGa.dt)}</div>`:''}</div>
      <div class="kpi"><div class="label">Vega (per vol pt)</div><div class="value">${lastVe?lastVe.v.toFixed(1)+' bps':'—'}</div>${lastVe?`<div class="change">${fmtDate(lastVe.dt)}</div>`:''}</div>
      <div class="kpi"><div class="label">Theta (30d)</div><div class="value">${lastTh?lastTh.v.toFixed(1)+' bps':'—'}</div>${lastTh?`<div class="change">${fmtDate(lastTh.dt)}</div>`:''}</div>
    </div>

  const mkLine = (id,label,key,color,fmtFn) => {
    charts[id] = new Chart(document.getElementById(id),{
      type:'line',
      data:{labels:d.map(r=>fmtDate(r.d)),datasets:[{label,data:d.map(r=>fmtFn(r[key])),borderColor:color,borderWidth:1.5,fill:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:10}}}}
    });
  };
  
  // Delta with avg
  {
    const vals = d.map(r=>r.de!=null?r.de*100:null);
    const ds = [{label:'Delta',data:vals,borderColor:'#3b82f6',borderWidth:1.5,fill:false}];
    const al = avgLine(vals,'Avg','rgba(59,130,246,.4)');
    if(al) ds.push(al);
    charts['deltaChart'] = new Chart(document.getElementById('deltaChart'),{
      type:'line',data:{labels:d.map(r=>fmtDate(r.d)),datasets:ds},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top'}},scales:{x:{ticks:{maxTicksLimit:10}},y:{title:{display:true,text:'%'}}}}
    });
  }
  // Vega + Equity Vega MW with avg lines
  {
    const veVals = d.map(r=>r.ve!=null?r.ve:null);
    const evwVals = d.map(r=>r.evw!=null?r.evw:null);
    const ds = [
      {label:'Vega (by vol pt)',data:veVals,borderColor:'#f59e0b',borderWidth:1.5,fill:false,spanGaps:true},
      {label:'Eq. Vega MW incl. CBs',data:evwVals,borderColor:'#22d3ee',borderWidth:1.5,borderDash:[5,3],fill:false,spanGaps:true},
    ];
    const al1 = avgLine(veVals,'Vega avg','rgba(245,158,11,.35)');
    const al2 = avgLine(evwVals,'Eq. Vega MW avg','rgba(34,211,238,.35)');
    if(al1) ds.push(al1);
    if(al2) ds.push(al2);
    charts['vegaChart'] = new Chart(document.getElementById('vegaChart'),{
      type:'line',data:{labels:d.map(r=>fmtDate(r.d)),datasets:ds},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top'}},scales:{x:{ticks:{maxTicksLimit:10}},y:{title:{display:true,text:'bps / vol pt'}}}}
    });
  }
  // Gamma with avg
  {
    const vals = d.map(r=>r.ga!=null?r.ga*100:null);
    const ds = [{label:'Gamma',data:vals,borderColor:'#10b981',borderWidth:1.5,fill:false}];
    const al = avgLine(vals,'Avg','rgba(16,185,129,.4)');
    if(al) ds.push(al);
    charts['gammaChart'] = new Chart(document.getElementById('gammaChart'),{
      type:'line',data:{labels:d.map(r=>fmtDate(r.d)),datasets:ds},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top'}},scales:{x:{ticks:{maxTicksLimit:10}},y:{title:{display:true,text:'%'}}}}
    });
  }
  // Theta: dual series + avg lines
  {
    const thVals = d.map(r=>r.th!=null?r.th:null);
    const othVals = d.map(r=>r.oth!=null?r.oth:null);
    const ds = [
      {label:'Theta (30d)',data:thVals,borderColor:'#ef4444',borderWidth:1.5,fill:false,spanGaps:true},
      {label:'Optional Theta (30d)',data:othVals,borderColor:'#f59e0b',borderWidth:1.5,borderDash:[5,3],fill:false,spanGaps:true},
    ];
    const al1 = avgLine(thVals,'Theta avg','rgba(239,68,68,.35)');
    const al2 = avgLine(othVals,'Opt. avg','rgba(245,158,11,.35)');
    if(al1) ds.push(al1);
    if(al2) ds.push(al2);
    charts['thetaChart'] = new Chart(document.getElementById('thetaChart'),{
      type:'line',data:{labels:d.map(r=>fmtDate(r.d)),datasets:ds},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top'}},scales:{x:{ticks:{maxTicksLimit:10}},y:{title:{display:true,text:'bps'}}}}
    });
  }

  const recent = d.slice(-24).reverse();
  let html = '<thead><tr><th>Date</th><th>Delta</th><th>Gamma</th><th>Vega</th><th>Eq. Vega MW</th><th>Theta (30d)</th><th>Opt. Theta (30d)</th><th>IR Sens.</th><th>Credit Sens.</th></tr></thead><tbody>';
  recent.forEach(r=>{
    html += `<tr><td>${fmtDate(r.d)}</td><td>${r.de!=null?(r.de*100).toFixed(2)+'%':'—'}</td><td>${r.ga!=null?(r.ga*100).toFixed(3)+'%':'—'}</td><td>${r.ve!=null?r.ve.toFixed(1):''}</td><td>${r.evw!=null?r.evw.toFixed(1):''}</td><td>${r.th!=null?r.th.toFixed(1):''}</td><td>${r.oth!=null?r.oth.toFixed(1):''}</td><td>${r.ir!=null?(r.ir*100).toFixed(2)+'bps':'—'}</td><td>${r.cr!=null?(r.cr*100).toFixed(2)+'%':'—'}</td></tr>`;
  });
  html += '</tbody>';
  document.getElementById('greeksTable').innerHTML = html;
}

function setAnalyticsPeriod(preset) {
  const allNav = RAW.nav;
  const total = allNav.length;
  const selTo = document.getElementById('analyticsTo');
  const selFrom = document.getElementById('analyticsFrom');
  selTo.value = total - 1;

  if (preset === 'itd') { selFrom.value = 0; }
  else if (preset === 'ytd') {
    const lastDate = allNav[total-1].d;
    const year = lastDate.slice(0,4);
    // Find Dec of previous year or first of current year
    let idx = allNav.findIndex(r => r.d.slice(0,4) === year);
    if (idx > 0) idx = idx - 1; // include last month of prev year as base
    selFrom.value = Math.max(0, idx);
  } else {
    const months = {_1y:12,_3y:36,_5y:60,_10y:120}['_'+preset] || 12;
    selFrom.value = Math.max(0, total - 1 - months);
  }
  computeAnalytics();
}

function computeAnalytics() {
  const allNav = RAW.nav;
  const ccy = state.currency;
  const cp = ccy[0];
  const baseKey = cp+'b';

  const iFrom = parseInt(document.getElementById('analyticsFrom').value);
  const iTo = parseInt(document.getElementById('analyticsTo').value);

  if (iFrom >= iTo) {
    document.getElementById('analyticsResults').innerHTML = '<p style="color:var(--text3);padding:40px;text-align:center">Select a valid date range (From must be before To)</p>';
    return;
  }

  const slice = allNav.slice(iFrom, iTo + 1);
  const n = slice.length;
  const dateFrom = slice[0].d;
  const dateTo = slice[n-1].d;

  const b100Full = slice.filter(r => r[baseKey] != null);
  if (b100Full.length < 2) {
    document.getElementById('analyticsResults').innerHTML = '<p style="color:var(--text3);padding:40px;text-align:center">Not enough base 100 data for this currency/period</p>';
    return;
  }

  const mtdReturns = [];
  const mtdDates = [];
  for (let i = 1; i < b100Full.length; i++) {
    mtdReturns.push(b100Full[i][baseKey] / b100Full[i-1][baseKey] - 1);
    mtdDates.push(b100Full[i].d);
  }
  const months = mtdReturns.length;
  const cumReturn = b100Full[b100Full.length-1][baseKey] / b100Full[0][baseKey] - 1;
  const years = months / 12;
  let annReturn = years > 0 ? Math.pow(1 + cumReturn, 1 / years) - 1 : null;

  const meanMtd = mtdReturns.reduce((a,b)=>a+b, 0) / months;
  const variance = mtdReturns.reduce((a,r) => a + Math.pow(r - meanMtd, 2), 0) / (months > 1 ? months - 1 : 1);
  const monthlyVol = Math.sqrt(variance);
  const annVol = monthlyVol * Math.sqrt(12);

  const rfAnnual = 0.02;
  let sharpe = (annVol > 0 && annReturn !== null) ? (annReturn - rfAnnual) / annVol : null;

  const downReturns = mtdReturns.filter(r => r < 0);
  const downVar = downReturns.length > 1 ? downReturns.reduce((a,r) => a + r*r, 0) / downReturns.length : 0;
  const downDev = Math.sqrt(downVar) * Math.sqrt(12);
  let sortino = (downDev > 0 && annReturn !== null) ? (annReturn - rfAnnual) / downDev : null;

  const bestMonth = Math.max(...mtdReturns);
  const worstMonth = Math.min(...mtdReturns);
  const bestDate = mtdDates[mtdReturns.indexOf(bestMonth)];
  const worstDate = mtdDates[mtdReturns.indexOf(worstMonth)];
  const posMonths = mtdReturns.filter(r => r > 0).length;
  const pctPositive = posMonths / months;

  let peak = -Infinity, maxDD = 0;
  let ddPeak = b100Full[0].d, ddTrough = b100Full[0].d, currentPeakDate = b100Full[0].d;
  for (const pt of b100Full) {
    const v = pt[baseKey];
    if (v > peak) { peak = v; currentPeakDate = pt.d; }
    const dd = (v - peak) / peak;
    if (dd < maxDD) { maxDD = dd; ddPeak = currentPeakDate; ddTrough = pt.d; }
  }

  let ddRecovery = '\u2014';
  if (ddTrough && maxDD < 0) {
    const troughIdx = b100Full.findIndex(r => r.d === ddTrough);
    const peakVal = b100Full.find(r => r.d === ddPeak)[baseKey];
    for (let i = troughIdx + 1; i < b100Full.length; i++) {
      if (b100Full[i][baseKey] >= peakVal) { ddRecovery = fmtDate(b100Full[i].d); break; }
    }
    if (ddRecovery === '\u2014') ddRecovery = 'Not recovered';
  }

  let calmar = (maxDD < 0 && annReturn !== null) ? annReturn / Math.abs(maxDD) : null;

  const base0 = b100Full[0][baseKey];
  const chartLabels = b100Full.map(r => fmtDate(r.d));
  const chartData = b100Full.map(r => (r[baseKey] / base0) * 100);

  let runPeak = chartData[0];
  const ddSeries = chartData.map(v => {
    if (v > runPeak) runPeak = v;
    return ((v - runPeak) / runPeak) * 100;
  });

  const results = document.getElementById('analyticsResults');
  results.innerHTML = `
    <div style="margin:16px 0 8px;font-size:13px;color:var(--text2)">
      ${ccy.toUpperCase()} Base 100 \u00b7 ${fmtDate(dateFrom)} \u2192 ${fmtDate(dateTo)} \u00b7 ${months} months (${years.toFixed(1)} years)
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="label">Cumulative Return</div><div class="value ${colorVal(cumReturn)}">${(cumReturn*100).toFixed(2)}%</div></div>
      <div class="kpi"><div class="label">Annualized Return</div><div class="value ${colorVal(annReturn)}">${annReturn!=null?(annReturn*100).toFixed(2)+'%':'\u2014'}</div></div>
      <div class="kpi"><div class="label">Realized Vol (Ann.)</div><div class="value">${(annVol*100).toFixed(2)}%</div></div>
      <div class="kpi"><div class="label">Sharpe Ratio (rf=2%)</div><div class="value">${sharpe!=null?sharpe.toFixed(2):'\u2014'}</div></div>
      <div class="kpi"><div class="label">Sortino Ratio (rf=2%)</div><div class="value">${sortino!=null?sortino.toFixed(2):'\u2014'}</div></div>
      <div class="kpi"><div class="label">Calmar Ratio</div><div class="value">${calmar!=null?calmar.toFixed(2):'\u2014'}</div></div>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="label">Max Drawdown</div><div class="value" style="color:var(--red)">${(maxDD*100).toFixed(2)}%</div>
        <div class="change">Peak: ${fmtDate(ddPeak)}</div>
        <div class="change">Trough: ${fmtDate(ddTrough)}</div>
        <div class="change">Recovery: ${ddRecovery}</div>
      </div>
      <div class="kpi"><div class="label">Best Month</div><div class="value" style="color:var(--green)">+${(bestMonth*100).toFixed(2)}%</div><div class="change">${fmtDate(bestDate)}</div></div>
      <div class="kpi"><div class="label">Worst Month</div><div class="value" style="color:var(--red)">${(worstMonth*100).toFixed(2)}%</div><div class="change">${fmtDate(worstDate)}</div></div>
      <div class="kpi"><div class="label">% Positive Months</div><div class="value">${(pctPositive*100).toFixed(1)}%</div><div class="change">${posMonths} / ${months}</div></div>
      <div class="kpi"><div class="label">Avg Monthly Return</div><div class="value ${colorVal(meanMtd)}">${(meanMtd*100).toFixed(3)}%</div></div>
      <div class="kpi"><div class="label">Monthly Vol</div><div class="value">${(monthlyVol*100).toFixed(3)}%</div></div>
    </div>
    <div class="charts-grid">
      <div class="chart-card full"><div class="chart-header"><h3>${ccy.toUpperCase()} Base 100 \u2014 Rebased to 100</h3>${chartExportBtns("analyticsPerfChart","bg_analytics_perf")}</div><div class="desc">${fmtDate(dateFrom)} \u2192 ${fmtDate(dateTo)}</div><div class="chart-wrap"><canvas id="analyticsPerfCanvas"></canvas></div></div>
      <div class="chart-card"><div class="chart-header"><h3>Drawdown</h3>${chartExportBtns("analyticsDD","bg_analytics_drawdown")}</div><div class="desc">Peak-to-trough from base 100</div><div class="chart-wrap"><canvas id="analyticsDDCanvas"></canvas></div></div>
      <div class="chart-card"><div class="chart-header"><h3>Monthly Return Distribution</h3>${chartExportBtns("analyticsHist","bg_analytics_distribution")}</div><div class="desc">Computed from base 100 series</div><div class="chart-wrap"><canvas id="analyticsHistCanvas"></canvas></div></div>
    </div>
  `;

  charts['analyticsPerfChart'] = new Chart(document.getElementById('analyticsPerfCanvas'), {
    type:'line',
    data:{labels:chartLabels, datasets:[{label:ccy.toUpperCase()+' Base 100 (rebased)',data:chartData,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.08)',fill:true,borderWidth:1.5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:12}},y:{beginAtZero:false}}}
  });

  charts['analyticsDD'] = new Chart(document.getElementById('analyticsDDCanvas'), {
    type:'line',
    data:{labels:chartLabels, datasets:[{label:'Drawdown %',data:ddSeries,borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.15)',fill:true,borderWidth:1.5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:10}},y:{ticks:{callback:v=>v.toFixed(1)+'%'}}}}
  });

  const binSize = 0.005;
  const minR = Math.floor(worstMonth / binSize) * binSize;
  const maxR = Math.ceil(bestMonth / binSize) * binSize;
  const bins = [];
  for (let b = minR; b <= maxR + binSize/2; b += binSize) bins.push({lo:b, hi:b+binSize, count:0, label:(b*100).toFixed(1)+'%'});
  mtdReturns.forEach(r => {
    const idx = Math.max(0, Math.min(bins.length-1, Math.floor((r - minR) / binSize)));
    bins[idx].count++;
  });

  charts['analyticsHist'] = new Chart(document.getElementById('analyticsHistCanvas'), {
    type:'bar',
    data:{labels:bins.map(b=>b.label), datasets:[{label:'Months',data:bins.map(b=>b.count),backgroundColor:bins.map(b=>b.lo>=0?'rgba(16,185,129,.7)':'rgba(239,68,68,.7)'),borderRadius:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{title:{display:true,text:'Monthly Return (from Base 100)'}},y:{title:{display:true,text:'Count'},ticks:{stepSize:1}}}}
  });
}

    <div class="charts-grid">
      <div class="chart-card full"><div class="chart-header"><h3>Rolling 36m Correlation vs Total Fund</h3>${chartExportBtns("rollCorr","bg_rolling_corr")}</div><div class="desc">36-month rolling window</div><div class="chart-wrap"><canvas id="rollCorrCanvas"></canvas></div></div>
      <div class="chart-card full"><div class="chart-header"><h3>Rolling 36m Beta vs Total Fund</h3>${chartExportBtns("rollBeta","bg_rolling_beta")}</div><div class="desc">36-month rolling window</div><div class="chart-wrap"><canvas id="rollBetaCanvas"></canvas></div></div>
    </div>
    <div class="matrix-section">
      <h3>Strategy Statistics</h3>
      <div class="desc">Summary stats for each group over the selected window</div>
      <div class="heatmap-wrap"><table class="heatmap" id="stratStats"></table></div>
    </div>
  `;

  // ====== COMPUTE SERIES ======
  const series = {};
  STRATS.forEach(s => { series[s.k] = d.map(r => getVal(r, s)); });
  series['t'] = d.map(r => r.t || 0);

  function mean(arr) { return arr.reduce((a,b)=>a+b,0)/arr.length; }
  function cov(a,b) {
    const ma=mean(a), mb=mean(b), nn=a.length;
    return a.reduce((s,v,i)=>s+(v-ma)*(b[i]-mb),0)/(nn-1);
  }
  function variance(a) { return cov(a,a); }
  function corr(a,b) {
    const va=variance(a), vb=variance(b);
    if(va===0||vb===0) return 0;
    return cov(a,b)/Math.sqrt(va*vb);
  }
  function beta(a,b) {
    const vb=variance(b);
    return vb===0?0:cov(a,b)/vb;
  }

  function corrColor(v) {
    if (v > 0) {
      const a = Math.min(v, 1);
      return 'background:rgba(16,185,129,'+(0.08+a*0.5)+');color:'+(a>0.6?'#fff':'var(--green)');
    }
    if (v < 0) {
      const a = Math.min(Math.abs(v), 1);
      return 'background:rgba(239,68,68,'+(0.08+a*0.5)+');color:'+(a>0.6?'#fff':'var(--red)');
    }
    return 'background:var(--surface3)';
  }
  function betaColor(v) {
    if (v > 0) {
      const a = Math.min(v, 2) / 2;
      return 'background:rgba(16,185,129,'+(0.08+a*0.4)+');color:var(--green)';
    }
    if (v < 0) {
      const a = Math.min(Math.abs(v), 2) / 2;
      return 'background:rgba(239,68,68,'+(0.08+a*0.4)+');color:var(--red)';
    }
    return 'background:var(--surface3)';
  }
  function numColor(v) {
    return v > 0 ? 'color:var(--green)' : v < 0 ? 'color:var(--red)' : '';
  }

  // ====== CORRELATION MATRIX with avg row/col ======
  const corrMat = STRATS.map((si,i) => STRATS.map((sj,j) => i===j ? 1 : corr(series[si.k], series[sj.k])));

  let corrHTML = '<thead><tr><th></th>';
  STRATS.forEach(s => corrHTML += '<th>'+s.l+'</th>');
  corrHTML += '<th style="background:var(--surface3)">Avg</th></tr></thead><tbody>';
  STRATS.forEach((si,i) => {
    corrHTML += '<tr><td>'+si.l+'</td>';
    STRATS.forEach((sj,j) => {
      const c = corrMat[i][j];
      const style = i===j ? 'background:var(--surface3);color:var(--text3)' : corrColor(c);
      corrHTML += '<td style="'+style+'">'+(i===j?'1.00':c.toFixed(2))+'</td>';
    });
    const rowVals = corrMat[i].filter((_,j) => j!==i);
    const rowAvg = rowVals.reduce((a,b)=>a+b,0)/rowVals.length;
    corrHTML += '<td style="font-weight:600;'+corrColor(rowAvg)+'">'+rowAvg.toFixed(2)+'</td>';
    corrHTML += '</tr>';
  });
  corrHTML += '<tr><td style="font-weight:600">Avg</td>';
  STRATS.forEach((sj,j) => {
    const colVals = corrMat.map((row,i) => row[j]).filter((_,i) => i!==j);
    const colAvg = colVals.reduce((a,b)=>a+b,0)/colVals.length;
    corrHTML += '<td style="font-weight:600;'+corrColor(colAvg)+'">'+colAvg.toFixed(2)+'</td>';
  });
  let allOffDiag = [];
  corrMat.forEach((row,i) => row.forEach((v,j) => { if(i!==j) allOffDiag.push(v); }));
  const grandAvg = allOffDiag.reduce((a,b)=>a+b,0)/allOffDiag.length;
  corrHTML += '<td style="font-weight:700;'+corrColor(grandAvg)+'">'+grandAvg.toFixed(2)+'</td>';
  corrHTML += '</tr></tbody>';
  document.getElementById('corrMatrix').innerHTML = corrHTML;

  // ====== BETA vs TOTAL ======
  let betaHTML = '<thead><tr><th>Strategy</th><th>Beta vs Total</th><th>Corr vs Total</th><th>Avg (bps/m)</th><th>Vol (Ann.)</th><th>Contribution (%)</th></tr></thead><tbody>';
  const totalSum = series['t'].reduce((a,b)=>a+b,0);
  STRATS.forEach(s => {
    const b = beta(series[s.k], series['t']);
    const c = corr(series[s.k], series['t']);
    const m = mean(series[s.k]);
    const vol = Math.sqrt(variance(series[s.k])) * Math.sqrt(12);
    const contrib = totalSum !== 0 ? (series[s.k].reduce((a,b)=>a+b,0) / totalSum * 100) : 0;
    betaHTML += '<tr><td>'+s.l+'</td><td style="'+betaColor(b)+'">'+b.toFixed(3)+'</td><td style="'+corrColor(c)+'">'+c.toFixed(2)+'</td><td style="'+numColor(m)+'">'+(m>=0?'+':'')+m.toFixed(1)+'</td><td>'+(vol/100).toFixed(2)+'%</td><td style="'+numColor(contrib)+'">'+contrib.toFixed(1)+'%</td></tr>';
  });
  betaHTML += '</tbody>';
  document.getElementById('betaTable').innerHTML = betaHTML;

  // ====== CROSS-BETA MATRIX with avg row/col ======
  const betaMat2 = STRATS.map((si,i) => STRATS.map((sj,j) => i===j ? 1 : beta(series[si.k], series[sj.k])));
  const betaVsTotal = STRATS.map(s => beta(series[s.k], series['t']));

  let cbHTML = '<thead><tr><th>Beta of &#8595; vs &#8594;</th>';
  STRATS.forEach(s => cbHTML += '<th>'+s.l+'</th>');
  cbHTML += '<th>Total</th><th style="background:var(--surface3)">Avg</th></tr></thead><tbody>';
  STRATS.forEach((si,i) => {
    cbHTML += '<tr><td>'+si.l+'</td>';
    STRATS.forEach((sj,j) => {
      const b = betaMat2[i][j];
      const style = i===j ? 'background:var(--surface3);color:var(--text3)' : betaColor(b);
      cbHTML += '<td style="'+style+'">'+(i===j?'1.000':b.toFixed(3))+'</td>';
    });
    cbHTML += '<td style="'+betaColor(betaVsTotal[i])+'">'+betaVsTotal[i].toFixed(3)+'</td>';
    const rowVals = betaMat2[i].filter((_,j) => j!==i);
    const rowAvg = rowVals.reduce((a,b)=>a+b,0)/rowVals.length;
    cbHTML += '<td style="font-weight:600;'+betaColor(rowAvg)+'">'+rowAvg.toFixed(3)+'</td>';
    cbHTML += '</tr>';
  });
  cbHTML += '<tr><td style="font-weight:600">Avg</td>';
  STRATS.forEach((sj,j) => {
    const colVals = betaMat2.map((row,i) => row[j]).filter((_,i) => i!==j);
    const colAvg = colVals.reduce((a,b)=>a+b,0)/colVals.length;
    cbHTML += '<td style="font-weight:600;'+betaColor(colAvg)+'">'+colAvg.toFixed(3)+'</td>';
  });
  const avgBetaTotal = betaVsTotal.reduce((a,b)=>a+b,0)/betaVsTotal.length;
  cbHTML += '<td style="font-weight:600;'+betaColor(avgBetaTotal)+'">'+avgBetaTotal.toFixed(3)+'</td>';
  let allOffDiagB = [];
  betaMat2.forEach((row,i) => row.forEach((v,j) => { if(i!==j) allOffDiagB.push(v); }));
  const grandAvgB = allOffDiagB.reduce((a,b)=>a+b,0)/allOffDiagB.length;
  cbHTML += '<td style="font-weight:700;'+betaColor(grandAvgB)+'">'+grandAvgB.toFixed(3)+'</td>';
  cbHTML += '</tr></tbody>';
  document.getElementById('crossBetaMatrix').innerHTML = cbHTML;

  // ====== ROLLING 36m CORR & BETA vs TOTAL ======
  const rollN = 36;
  if (allPerf.length > rollN) {
    const rollDates = [];
    const rollCorrs = {};
    const rollBetas = {};
    STRATS.forEach(s => { rollCorrs[s.k] = []; rollBetas[s.k] = []; });

    for (let i = rollN; i <= allPerf.length; i++) {
      const window = allPerf.slice(i-rollN, i);
      rollDates.push(fmtDate(window[window.length-1].d));
      const totalW = window.map(r => r.t || 0);
      STRATS.forEach(s => {
        const sw = window.map(r => getVal(r, s));
        rollCorrs[s.k].push(corr(sw, totalW));
        rollBetas[s.k].push(beta(sw, totalW));
      });
    }

    const lineColors = ['#3b82f6','#60a5fa','#22d3ee','#06b6d4','#10b981','#14b8a6','#f59e0b','#fb923c','#f97316','#a78bfa'];

    charts['rollCorr'] = new Chart(document.getElementById('rollCorrCanvas'), {
      type:'line',
      data:{
        labels: rollDates,
        datasets: STRATS.map((s,i) => ({
          label:s.l, data:rollCorrs[s.k], borderColor:lineColors[i % lineColors.length], borderWidth:1.2, fill:false, pointRadius:0
        }))
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}},scales:{x:{ticks:{maxTicksLimit:12}},y:{min:-1,max:1,title:{display:true,text:'Correlation'}}}}
    });

    charts['rollBeta'] = new Chart(document.getElementById('rollBetaCanvas'), {
      type:'line',
      data:{
        labels: rollDates,
        datasets: STRATS.map((s,i) => ({
          label:s.l, data:rollBetas[s.k], borderColor:lineColors[i % lineColors.length], borderWidth:1.2, fill:false, pointRadius:0
        }))
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}},scales:{x:{ticks:{maxTicksLimit:12}},y:{title:{display:true,text:'Beta'}}}}
    });
  }

  // ====== STRATEGY STATS ======
  let statsHTML = '<thead><tr><th>Strategy</th><th>Total (bps)</th><th>Avg/Month</th><th>Vol (Ann.)</th><th>Best Month</th><th>Worst Month</th><th>% Positive</th><th>Sharpe*</th></tr></thead><tbody>';
  STRATS.forEach(s => {
    const arr = series[s.k];
    const total = arr.reduce((a,b)=>a+b,0);
    const m = mean(arr);
    const vol = Math.sqrt(variance(arr)) * Math.sqrt(12);
    const best = Math.max(...arr);
    const worst = Math.min(...arr);
    const pos = arr.filter(v=>v>0).length;
    const sharpe = vol > 0 ? (m * 12) / vol : 0;
    const tc = total >= 0 ? 'color:var(--green)' : 'color:var(--red)';
    statsHTML += '<tr><td>'+s.l+'</td><td style="'+tc+'">'+total.toFixed(0)+'</td><td style="'+numColor(m)+'">'+m.toFixed(1)+'</td><td>'+(vol/100).toFixed(2)+'%</td><td style="color:var(--green)">'+best.toFixed(0)+'</td><td style="color:var(--red)">'+worst.toFixed(0)+'</td><td>'+((pos/n)*100).toFixed(0)+'%</td><td style="'+numColor(sharpe)+'">'+sharpe.toFixed(2)+'</td></tr>';
  });
  const tArr = series['t'];
  const tTotal = tArr.reduce((a,b)=>a+b,0);
  const tM = mean(tArr);
  const tVol = Math.sqrt(variance(tArr)) * Math.sqrt(12);
  const tSharpe = tVol > 0 ? (tM * 12) / tVol : 0;
  const tColor = tTotal >= 0 ? 'color:var(--green)' : 'color:var(--red)';
  statsHTML += '<tr style="border-top:2px solid var(--accent)"><td style="font-weight:700">Total Fund</td><td style="font-weight:700;'+tColor+'">'+tTotal.toFixed(0)+'</td><td style="'+numColor(tM)+'">'+tM.toFixed(1)+'</td><td>'+(tVol/100).toFixed(2)+'%</td><td style="color:var(--green)">'+Math.max(...tArr).toFixed(0)+'</td><td style="color:var(--red)">'+Math.min(...tArr).toFixed(0)+'</td><td>'+((tArr.filter(v=>v>0).length/n)*100).toFixed(0)+'%</td><td style="'+numColor(tSharpe)+'">'+tSharpe.toFixed(2)+'</td></tr>';
  statsHTML += '</tbody>';
  document.getElementById('stratStats').innerHTML = statsHTML;
}

// ============= PERF RANKINGS TAB =============
function renderPerfStats(el) {
  const allNav = RAW.nav;
  const ccy = state.currency;
  const cp = ccy[0];
  const baseKey = cp+'b';
  const rollPeriod = state.rollPeriod || '1m';

  const d = getFilteredData(allNav).filter(r => r[baseKey] != null);
  if (d.length < 2) {
    el.innerHTML = '<p style="color:var(--text3);padding:40px;text-align:center">Not enough data</p>';
    return;
  }

  // Monthly returns from base 100
  const months = [];
  for (let i = 1; i < d.length; i++) {
    const ret = d[i][baseKey] / d[i-1][baseKey] - 1;
    const dt = new Date(d[i].d);
    months.push({ d: d[i].d, ret, year: dt.getFullYear(), month: dt.getMonth()+1, q: Math.ceil((dt.getMonth()+1)/3) });
  }

  // Rolling returns
  const PERIODS = {
    '1m':  {label:'1 Month', n:1, ann:false},
    '3m':  {label:'3 Months', n:3, ann:false},
    '6m':  {label:'6 Months', n:6, ann:false},
    '1y':  {label:'1 Year', n:12, ann:false},
    '3y':  {label:'3 Years', n:36, ann:true},
    '5y':  {label:'5 Years', n:60, ann:true},
  };
  const P = PERIODS[rollPeriod];
  const rollN = P.n;

  // Compute rolling returns
  const rollings = [];
  for (let i = rollN; i < d.length; i++) {
    const start = d[i - rollN][baseKey];
    const end = d[i][baseKey];
    let ret = end / start - 1;
    if (P.ann && rollN >= 12) {
      ret = Math.pow(end / start, 12 / rollN) - 1;
    }
    rollings.push({ d: d[i].d, ret, label: fmtDate(d[i-rollN].d) + ' \u2192 ' + fmtDate(d[i].d) });
  }

  if (rollings.length === 0) {
    el.innerHTML = '<p style="color:var(--text3);padding:40px;text-align:center">Not enough data for '+P.label+' rolling window</p>';
    return;
  }

  const rRets = rollings.map(r => r.ret);
  const rSorted = [...rollings].sort((a,b) => b.ret - a.ret);

  // Stats
  const rMean = rRets.reduce((a,b)=>a+b,0)/rRets.length;
  const rMedian = [...rRets].sort((a,b)=>a-b)[Math.floor(rRets.length/2)];
  const rVariance = rRets.reduce((a,r)=>a+Math.pow(r-rMean,2),0)/(rRets.length > 1 ? rRets.length-1 : 1);
  const rStdDev = Math.sqrt(rVariance);
  const rPos = rRets.filter(r=>r>0).length;
  const rBest = rSorted[0];
  const rWorst = rSorted[rSorted.length-1];

  // Current (last) rolling
  const lastRoll = rollings[rollings.length-1];
  const lastRank = rSorted.findIndex(r => r.d === lastRoll.d) + 1;
  const lastPctile = ((1 - (lastRank - 1) / rSorted.length) * 100);

  // Quarterly returns (always computed for heatmap)
  const qMap = {};
  months.forEach(m => {
    const key = m.year + '-Q' + m.q;
    if (!qMap[key]) qMap[key] = { key, year: m.year, q: m.q, rets: [] };
    qMap[key].rets.push(m.ret);
    qMap[key].endDate = m.d;
  });
  const quarters = Object.values(qMap).map(q => ({
    ...q, ret: q.rets.reduce((acc, r) => acc * (1 + r), 1) - 1
  }));
  const qRets = quarters.map(q => q.ret);
  const qMean = qRets.length ? qRets.reduce((a,b)=>a+b,0)/qRets.length : 0;
  const qStdDev = qRets.length > 1 ? Math.sqrt(qRets.reduce((a,r)=>a+Math.pow(r-qMean,2),0)/(qRets.length-1)) : 0;

  // Monthly stats
  const mRets = months.map(m => m.ret);
  const mMean = mRets.reduce((a,b)=>a+b,0)/mRets.length;
  const mStdDev = Math.sqrt(mRets.reduce((a,r)=>a+Math.pow(r-mMean,2),0)/(mRets.length > 1 ? mRets.length-1 : 1));
  const mPos = mRets.filter(r=>r>0).length;

  const retLabel = P.ann ? 'Annualized Return' : 'Return';

  el.innerHTML = `
    <div class="controls" style="gap:14px;align-items:center">
      <select onchange="state.currency=this.value;renderPerfStats(document.getElementById('content'))">
        ${['usd','eur'].map(c=>'<option value="'+c+'" '+(c===ccy?'selected':'')+'>'+c.toUpperCase()+'</option>').join('')}
      </select>
      <label style="font-size:12px;color:var(--text2)">Rolling Period</label>
      <div class="slider-presets">
        ${Object.entries(PERIODS).map(([k,v]) =>
          '<button data-p="'+k+'" style="'+(k===rollPeriod?'color:var(--accent2);border-color:var(--accent);background:rgba(59,130,246,.1)':'')+'" onclick="state.rollPeriod=\''+k+'\';renderPerfStats(document.getElementById(\'content\'))">'+v.label+'</button>'
        ).join('')}
      </div>
    </div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:20px">
      ${ccy.toUpperCase()} Base 100 &middot; ${fmtDate(d[0].d)} &rarr; ${fmtDate(d[d.length-1].d)} &middot; Rolling ${P.label} &middot; ${rollings.length} observations
    </div>

    <div class="kpi-row">
      <div class="kpi">
        <div class="label">Latest ${P.label}: ${fmtDate(lastRoll.d)}</div>
        <div class="value" style="color:var(${lastRoll.ret>=0?'--green':'--red'})">${(lastRoll.ret*100).toFixed(2)}%${P.ann?' ann.':''}</div>
        <div class="change">Rank: <strong>#${lastRank}</strong> / ${rollings.length} (${lastPctile.toFixed(0)}th percentile)</div>
      </div>
      <div class="kpi">
        <div class="label">Average ${retLabel}</div>
        <div class="value" style="color:var(${rMean>=0?'--green':'--red'})">${(rMean*100).toFixed(2)}%</div>
        <div class="change">Median: ${(rMedian*100).toFixed(2)}%</div>
      </div>
      <div class="kpi">
        <div class="label">Std Deviation</div>
        <div class="value">${(rStdDev*100).toFixed(2)}%</div>
        <div class="change">&plusmn;1&sigma; = [${((rMean-rStdDev)*100).toFixed(2)}%, ${((rMean+rStdDev)*100).toFixed(2)}%]</div>
      </div>
      <div class="kpi">
        <div class="label">% Positive</div>
        <div class="value">${(rPos/rollings.length*100).toFixed(1)}%</div>
        <div class="change">${rPos} / ${rollings.length}</div>
      </div>
      <div class="kpi">
        <div class="label">Best ${P.label}</div>
        <div class="value" style="color:var(--green)">+${(rBest.ret*100).toFixed(2)}%</div>
        <div class="change">${fmtDate(rBest.d)}</div>
      </div>
      <div class="kpi">
        <div class="label">Worst ${P.label}</div>
        <div class="value" style="color:var(--red)">${(rWorst.ret*100).toFixed(2)}%</div>
        <div class="change">${fmtDate(rWorst.d)}</div>
      </div>
    </div>

    <div class="kpi-row" style="margin-bottom:8px">
      <div class="kpi" style="border-left:3px solid var(--accent)">
        <div class="label">Monthly Stats (reference)</div>
        <div class="change">Avg: ${(mMean*100).toFixed(3)}% · Std: ${(mStdDev*100).toFixed(3)}% · Positive: ${mPos}/${mRets.length} (${(mPos/mRets.length*100).toFixed(0)}%)</div>
      </div>
      <div class="kpi" style="border-left:3px solid var(--amber)">
        <div class="label">Quarterly Stats (reference)</div>
        <div class="change">Avg: ${(qMean*100).toFixed(2)}% · Std: ${(qStdDev*100).toFixed(2)}% · Positive: ${qRets.filter(r=>r>0).length}/${qRets.length} (${qRets.length?(qRets.filter(r=>r>0).length/qRets.length*100).toFixed(0):0}%)</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card"><div class="chart-header"><h3>Rolling ${P.label} — Distribution</h3>${chartExportBtns("rollHistChart","bg_roll_hist")}</div><div class="desc">Current period in blue · &sigma; bands shown</div><div class="chart-wrap"><canvas id="rollHistCanvas"></canvas></div></div>
      <div class="chart-card"><div class="chart-header"><h3>Rolling ${P.label} — Time Series</h3>${chartExportBtns("rollTSChart","bg_roll_ts")}</div><div class="desc">Evolution over time with average &amp; &plusmn;1&sigma;</div><div class="chart-wrap"><canvas id="rollTSCanvas"></canvas></div></div>
    </div>

    <div class="charts-grid" style="grid-template-columns:1fr">
      <div class="chart-card"><div class="chart-header"><h3>Rolling ${P.label} — Ranked</h3>${chartExportBtns("rollRankChart","bg_roll_ranked")}</div><div class="desc">All periods sorted best to worst · current highlighted</div><div class="chart-wrap"><canvas id="rollRankCanvas"></canvas></div></div>
    </div>

    <div class="section-title" style="margin-top:24px">Top 10 & Bottom 10 — Rolling ${P.label}</div>
    <div class="charts-grid">
      <div class="table-wrap"><table id="topRoll"></table></div>
      <div class="table-wrap"><table id="bottomRoll"></table></div>
    </div>

    <div class="section-title">Quarterly Performance Heatmap</div>
    <div class="table-wrap"><table class="heatmap" id="qHeatmap"></table></div>
  `;

  // ====== HISTOGRAM ======
  const binSize = Math.max(0.002, rStdDev * 0.4) || 0.005;
  const minR = Math.floor(rWorst.ret / binSize) * binSize;
  const maxR = Math.ceil(rBest.ret / binSize) * binSize;
  const bins = [];
  for (let b = minR; b <= maxR + binSize/2; b += binSize) bins.push({lo:b, count:0, label:(b*100).toFixed(1)+'%'});
  rRets.forEach(r => {
    const idx = Math.max(0, Math.min(bins.length-1, Math.floor((r - minR) / binSize)));
    bins[idx].count++;
  });
  const lastBin = Math.max(0, Math.min(bins.length-1, Math.floor((lastRoll.ret - minR) / binSize)));

  charts['rollHistChart'] = new Chart(document.getElementById('rollHistCanvas'), {
    type:'bar',
    data:{labels:bins.map(b=>b.label), datasets:[{
      label:'Count', data:bins.map(b=>b.count),
      backgroundColor:bins.map((b,i)=> i===lastBin ? '#3b82f6' : b.lo>=0?'rgba(16,185,129,.5)':'rgba(239,68,68,.5)'),
      borderColor:bins.map((b,i)=> i===lastBin ? '#60a5fa' : 'transparent'),
      borderWidth:bins.map((b,i)=> i===lastBin ? 2 : 0), borderRadius:2
    }]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{title:{display:true,text:retLabel}},y:{title:{display:true,text:'Count'},ticks:{stepSize:1}}}}
  });

  // ====== TIME SERIES ======
  charts['rollTSChart'] = new Chart(document.getElementById('rollTSCanvas'), {
    type:'line',
    data:{
      labels: rollings.map(r => fmtDate(r.d)),
      datasets:[
        {label:P.label+' return', data:rRets.map(v=>v*100), borderColor:'#3b82f6', borderWidth:1.5, fill:false, pointRadius:0},
        {label:'Average', data:rRets.map(()=>rMean*100), borderColor:'rgba(245,158,11,.6)', borderWidth:1, borderDash:[4,4], pointRadius:0, fill:false},
        {label:'+1\u03c3', data:rRets.map(()=>(rMean+rStdDev)*100), borderColor:'rgba(100,116,139,.3)', borderWidth:1, borderDash:[2,4], pointRadius:0, fill:false},
        {label:'-1\u03c3', data:rRets.map(()=>(rMean-rStdDev)*100), borderColor:'rgba(100,116,139,.3)', borderWidth:1, borderDash:[2,4], pointRadius:0, fill:'-1'},
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10}}},filler:{propagate:false}},scales:{x:{ticks:{maxTicksLimit:12}},y:{ticks:{callback:v=>v.toFixed(1)+'%'}}}}
  });

  // ====== RANKED BAR ======
  const lastIdx = rSorted.findIndex(r => r.d === lastRoll.d);
  charts['rollRankChart'] = new Chart(document.getElementById('rollRankCanvas'), {
    type:'bar',
    data:{
      labels:rSorted.map((r,i) => '#'+(i+1)),
      datasets:[{
        label:'Return', data:rSorted.map(r => r.ret*100),
        backgroundColor:rSorted.map((r,i) => i===lastIdx ? '#3b82f6' : r.ret>=0?'rgba(16,185,129,.5)':'rgba(239,68,68,.5)'),
        borderColor:rSorted.map((r,i) => i===lastIdx ? '#60a5fa' : 'transparent'),
        borderWidth:rSorted.map((r,i) => i===lastIdx ? 2 : 0), borderRadius:1
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{title:ctx=>{const r=rSorted[ctx[0].dataIndex];return r.label||fmtDate(r.d);},label:ctx=>ctx.parsed.y.toFixed(2)+'%'}}},scales:{x:{display:false},y:{ticks:{callback:v=>v.toFixed(1)+'%'}}}}
  });

  // ====== TOP/BOTTOM TABLES ======
  function rankTable(sorted, count, elId, isTop) {
    let h = '<thead><tr><th>#</th><th>Period</th><th>Return</th></tr></thead><tbody>';
    const slice = isTop ? sorted.slice(0, count) : sorted.slice(-count).reverse();
    slice.forEach((item, i) => {
      const rank = isTop ? i+1 : sorted.length - count + (count - i);
      const c = item.ret >= 0 ? 'color:var(--green)' : 'color:var(--red)';
      const isLast = item.d === lastRoll.d;
      const bg = isLast ? 'background:rgba(59,130,246,.15);' : '';
      h += '<tr style="'+bg+'"><td>'+rank+'</td><td>'+fmtDate(item.d)+'</td><td style="'+c+';font-weight:600">'+(item.ret>=0?'+':'')+(item.ret*100).toFixed(2)+'%</td></tr>';
    });
    h += '</tbody>';
    document.getElementById(elId).innerHTML = h;
  }
  rankTable(rSorted, 10, 'topRoll', true);
  rankTable(rSorted, 10, 'bottomRoll', false);

  // ====== QUARTERLY HEATMAP ======
  const qByYear = {};
  quarters.forEach(q => {
    if (!qByYear[q.year]) qByYear[q.year] = {};
    qByYear[q.year][q.q] = q.ret;
  });
  const yrsQ = Object.keys(qByYear).sort();
  let qhHTML = '<thead><tr><th>Year</th><th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th><th>Annual</th></tr></thead><tbody>';
  yrsQ.forEach(yr => {
    qhHTML += '<tr><td>'+yr+'</td>';
    let annComp = 1;
    for (let q = 1; q <= 4; q++) {
      const v = qByYear[yr][q];
      if (v != null) {
        annComp *= (1 + v);
        const c = v >= 0 ? 'color:var(--green)' : 'color:var(--red)';
        const bg = Math.abs(v) > 0.02 ? (v>=0 ? 'background:rgba(16,185,129,'+(Math.min(Math.abs(v)*5,0.4))+')' : 'background:rgba(239,68,68,'+(Math.min(Math.abs(v)*5,0.4))+')') : '';
        qhHTML += '<td style="'+c+';'+bg+'">'+(v>=0?'+':'')+(v*100).toFixed(2)+'%</td>';
      } else {
        qhHTML += '<td></td>';
      }
    }
    const ann = annComp - 1;
    const ac = ann >= 0 ? 'color:var(--green)' : 'color:var(--red)';
    qhHTML += '<td style="font-weight:600;'+ac+'">'+(ann>=0?'+':'')+(ann*100).toFixed(2)+'%</td>';
    qhHTML += '</tr>';
  });
  qhHTML += '</tbody>';
  document.getElementById('qHeatmap').innerHTML = qhHTML;
}

// ============= INIT =============
// Apply default 3Y window
(function initDefault() {
  const data = RAW.nav;
  const total = data.length;
  const months = 36;
  state.rangeMin = Math.max(0, (total - months) / (total - 1));
  state.rangeMax = 1;
  state.preset = '3y';
})();
render();
</script>
</body>
</html>
